<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IREA - Iconics Real Estate Agency</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/fonts/font-awesome.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: #0f1923;
        }

        .navbar-default {
            background: rgba(255, 255, 255, 0.98);
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 14px 0;
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 900;
            color: #1d293e !important;
        }

        .navbar-brand span {
            color: #35ac39;
        }

        .menu-top ul {
            list-style: none;
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }

        .menu-top li a {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #1d293e;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
        }

        .menu-top li a:hover {
            background: rgba(53, 172, 57, 0.1);
            color: #35ac39;
        }

        .home_bg {
            min-height: 100vh;
            padding-top: 90px;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #0f1923 0%, #1d293e 55%, #163d2a 100%);
        }

        .hero-text {
            text-align: center;
            color: white;
        }

        .hero-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 60px;
            font-weight: 900;
        }

        .hero-text em {
            color: #35ac39;
        }

        .home_btn a {
            display: inline-block;
            padding: 13px 28px;
            margin: 6px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
        }

        .home_btn_color_one {
            background: #fff;
            color: #1d293e;
        }

        .home_btn_color_two {
            background: #35ac39;
            color: #fff;
        }
    </style>
</head>

<body>

    <header class="navbar-default">
        <div class="container">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div class="navbar-brand">IR<span>EA</span></div>

                <nav class="menu-top">
                    <ul id="nav">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="property.html">Properties</a></li>
                        <li><a href="auth.html">Login / Register</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <section class="home_bg">
        <div class="container">
            <div class="hero-text">
                <h1>Real Estate You Can<br><em>Actually Trust</em></h1>

                <p style="color: rgba(255,255,255,0.7); margin-top:15px;">
                    Verified agents. GPS validated listings. Fraud-resistant platform.
                </p>

                <div class="home_btn">
                    <a href="property.html" class="home_btn_color_one">Browse</a>
                    <a href="auth.html" class="home_btn_color_two">Get Started</a>
                </div>
            </div>
        </div>
    </section>

    <script src="assets/js/auth.js"></script>

    <script>
        async function init() {
            try {
                const res = await Iconics.call("auth", "GET");

                if (res.success) {
                    document.getElementById("nav").innerHTML = `
                <li><a href="index.html">Home</a></li>
                <li><a href="property.html">Properties</a></li>
                <li><a href="#" onclick="goDash('${res.user.role}')">Dashboard</a></li>
                <li><a href="#" onclick="Iconics.logout()">Logout</a></li>
            `;
                }
            } catch (e) { }
        }

        function goDash(role) {
            if (role === "admin") location.href = "admin/dashboard.html";
            if (role === "agent") location.href = "agent/dashboard.html";
            if (role === "client") location.href = "client/dashboard.html";
        }

        window.onload = init;
    </script>

</body>

</html>

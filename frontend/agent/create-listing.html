<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Property Listing — IREA FDIVS</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.min.css">
    <style>
        :root {
            --primary-dark: #0f1923;
            --accent-green: #35ac39;
            --text-gray: #777;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }

        .listing-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .listing-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .listing-header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-dark);
            margin-bottom: 10px;
        }

        .listing-header p {
            color: var(--text-gray);
            font-size: 14px;
        }

        .form-section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid #eee;
        }

        .form-section:last-child {
            border-bottom: none;
        }

        .form-section h4 {
            color: var(--primary-dark);
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 16px;
        }

        .form-group label {
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 8px;
            font-size: 13px;
        }

        .form-control {
            border: 1px solid #ddd;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-control:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 0.2rem rgba(53, 172, 57, 0.25);
        }

        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }

        .row-cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .submit-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #2d8f30;
            color: white;
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .required {
            color: #dc3545;
        }

        @media (max-width: 768px) {
            .row-cols {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="listing-container">
        <div class="listing-header">
            <h1>Create Property Listing</h1>
            <p>List your property and reach thousands of potential buyers</p>
        </div>

        <form id="listing-form">
            <!-- Basic Information -->
            <div class="form-section">
                <h4>Basic Information</h4>

                <div class="form-group">
                    <label for="title">Property Title <span class="required">*</span></label>
                    <input type="text" class="form-control" id="title" name="title"
                        placeholder="e.g., Spacious 3-Bedroom Apartment in Downtown" required>
                </div>

                <div class="form-group">
                    <label for="description">Description <span class="required">*</span></label>
                    <textarea class="form-control" id="description" name="description"
                        placeholder="Describe your property in detail..." required></textarea>
                </div>

                <div class="row-cols">
                    <div class="form-group">
                        <label for="property_type">Property Type <span class="required">*</span></label>
                        <select class="form-control" id="property_type" name="property_type" required>
                            <option value="">Select Type</option>
                            <option value="apartment">Apartment</option>
                            <option value="house">House</option>
                            <option value="condo">Condo</option>
                            <option value="commercial">Commercial</option>
                            <option value="land">Land</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="price">Price (USD) <span class="required">*</span></label>
                        <input type="number" class="form-control" id="price" name="price" placeholder="0.00" min="0"
                            step="0.01" required>
                    </div>
                </div>
            </div>

            <!-- Location Information -->
            <div class="form-section">
                <h4>Location Information</h4>

                <div class="form-group">
                    <label for="area_name">Area/Neighborhood <span class="required">*</span></label>
                    <input type="text" class="form-control" id="area_name" name="area_name"
                        placeholder="e.g., Downtown, Midtown, Brooklyn" required>
                </div>

                <div class="row-cols">
                    <div class="form-group">
                        <label for="latitude">Latitude</label>
                        <input type="number" class="form-control" id="latitude" name="latitude"
                            placeholder="e.g., 40.7128" step="0.00001">
                    </div>

                    <div class="form-group">
                        <label for="longitude">Longitude</label>
                        <input type="number" class="form-control" id="longitude" name="longitude"
                            placeholder="e.g., -74.0060" step="0.00001">
                    </div>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="submit-btn" id="submit-btn">Create Listing</button>

            <!-- Status Message -->
            <div class="status-message" id="status-message"></div>
        </form>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
        document.getElementById('listing-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submit-btn');
            const statusMsg = document.getElementById('status-message');

            submitBtn.disabled = true;
            submitBtn.innerText = 'Creating...';

            try {
                const formData = new FormData(this);

                // Create a regular object from FormData
                const data = {};
                formData.forEach((value, key) => {
                    data[key] = value;
                });

                const res = await Iconics.call("properties", "POST", data, "?action=create");

                if (res.status === "success") {
                    statusMsg.className = 'status-message success';
                    statusMsg.innerHTML = `<strong>✓ Success!</strong> Your property listing has been created and is pending admin review.`;
                    submitBtn.innerText = 'Listing Created ✓';
                    setTimeout(() => {
                        window.location.href = 'listings.html';
                    }, 2000);
                } else {
                    statusMsg.className = 'status-message error';
                    statusMsg.innerHTML = `<strong>✗ Error:</strong> ${res.message || 'Failed to create listing. Please try again.'}`;
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Create Listing';
                }
            } catch (error) {
                statusMsg.className = 'status-message error';
                statusMsg.innerHTML = `<strong>✗ Error:</strong> ${error.message}`;
                submitBtn.disabled = false;
                submitBtn.innerText = 'Create Listing';
            }
        });
    </script>
</body>

</html>

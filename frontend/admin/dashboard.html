<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Iconics Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.min.css">
    <style>
        :root {
            --primary-dark: #0f1923;
            --accent-green: #35ac39;
            --accent-red: #dc3545;
            --text-gray: #777;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }

        .sidebar {
            height: 100vh;
            background: var(--primary-dark);
            color: white;
            padding-top: 20px;
            position: fixed;
            width: 240px;
        }

        .sidebar h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-size: 22px;
            margin-bottom: 30px;
            color: var(--accent-green);
        }

        .nav-link {
            color: #adb5bd;
            padding: 12px 25px;
            transition: 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--accent-green);
        }

        .main-content {
            margin-left: 240px;
            padding: 40px;
        }

        .dashboard-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .stat-card {
            border: none;
            border-radius: 15px;
            padding: 20px;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .mono {
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
        }

        .badge-red {
            background-color: #f8d7da;
            color: #721c24;
        }

        .badge-blue {
            background-color: #cce5ff;
            color: #004085;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>Iconics Admin</h2>
        <nav class="nav flex-column">
            <a class="nav-link active" href="dashboard.html">Dashboard</a>
            <a class="nav-link" href="listings.html">Listings</a>
            <a class="nav-link" href="agents.html">Agents</a>
            <hr style="background: rgba(255,255,255,0.1)">
            <a class="nav-link text-danger" href="#" onclick="logout()">Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <header class="mb-5">
            <h1 style="font-family: 'Playfair Display';">System Overview</h1>
            <p class="text-muted" id="admin-welcome">Welcome, Administrator</p>
        </header>

        <div class="row mb-5">
            <div class="col-md-4">
                <div class="stat-card">
                    <h6 class="text-muted small text-uppercase">Pending Review</h6>
                    <h2 id="pending-count">--</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <h6 class="text-muted small text-uppercase">Fraud Flags</h6>
                    <h2 id="flagged-count" class="text-danger">--</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <h6 class="text-muted small text-uppercase">Verified Agents</h6>
                    <h2 id="agent-count" class="text-success">--</h2>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-5">
                <div class="dashboard-section">
                    <h5 class="mb-4" style="font-family: 'Playfair Display';">Security Alerts</h5>
                    <div id="fraud-alerts-container">
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="dashboard-section">
                    <h5 class="mb-4" style="font-family: 'Playfair Display';">System Audit Log</h5>
                    <div class="table-responsive">
                        <table class="table table-sm align-middle">
                            <thead>
                                <tr class="text-muted small">
                                    <th>TIME</th>
                                    <th>USER</th>
                                    <th>EVENT</th>
                                    <th>IP</th>
                                </tr>
                            </thead>
                            <tbody id="audit-log-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
        async function initDashboard() {
            try {
                // 1. Load Stats
                const stats = await Iconics.call("admin/stats", "GET");
                if (stats.status === "success") {
                    document.getElementById('pending-count').innerText = stats.data.pending;
                    document.getElementById('flagged-count').innerText = stats.data.flagged;
                    document.getElementById('agent-count').innerText = stats.data.agents;
                }

                // 2. Load Fraud Alerts
                const fraud = await Iconics.call("admin/fraud_logs", "GET");
                if (fraud.status === "success") {
                    const container = document.getElementById('fraud-alerts-container');
                    container.innerHTML = fraud.data.map(log => `
                        <div class="alert alert-light border-start border-danger border-4 mb-2 py-2">
                            <div class="d-flex justify-content-between">
                                <strong>${log.fraud_type}</strong>
                                <span class="badge badge-red small">FLAGGED</span>
                            </div>
                            <small class="text-muted d-block">${log.reason}</small>
                            <small class="mono text-muted">ID: #${log.property_id}</small>
                        </div>
                    `).join('');
                }

                // 3. Load Audit Log (Logic from audit_log.php)
                const audit = await Iconics.call("admin/audit_logs", "GET");
                if (audit.status === "success") {
                    const tbody = document.getElementById('audit-log-body');
                    tbody.innerHTML = audit.data.map(log => `
                        <tr>
                            <td class="mono small">${new Date(log.logged_at).toLocaleTimeString()}</td>
                            <td>
                                <strong>${log.full_name || 'System'}</strong><br>
                                <span class="badge ${log.user_role === 'admin' ? 'badge-red' : 'badge-blue'} py-0" style="font-size:9px;">
                                    ${log.user_role.toUpperCase()}
                                </span>
                            </td>
                            <td class="mono small">${log.event_type}</td>
                            <td class="mono small text-muted">${log.ip_address || '—'}</td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error("Dashboard Load Error:", err);
            }
        }

        async function logout() {
            await Iconics.call("auth/logout", "POST");
            window.location.href = "../auth.html";
        }

        window.onload = async () => {
            const auth = await Iconics.check();
            if (auth.status === "success" && auth.data.user.role === 'admin') {
                document.getElementById('admin-welcome').innerText = "Welcome, " + auth.data.user.name;
                initDashboard();
            } else {
                window.location.href = "../auth.html";
            }
        };
    </script>
</body>

</html>

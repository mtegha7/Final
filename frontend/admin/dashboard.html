<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Iconics Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.min.css">
    <style>
        :root {
            --primary-dark: #0f1923;
            --accent-green: #35ac39;
            --accent-red: #d9534f;
            --text-gray: #777;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }

        /* Sidebar UI - Adapted from Listings Page */
        .sidebar {
            height: 100vh;
            background: var(--primary-dark);
            color: white;
            padding-top: 20px;
            position: fixed;
            width: 240px;
        }

        .sidebar h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-size: 22px;
            margin-bottom: 30px;
            color: var(--accent-green);
        }

        .nav-link {
            color: #adb5bd;
            padding: 12px 25px;
            transition: 0.3s;
            text-decoration: none;
            display: block;
        }

        .nav-link:hover,
        .nav-link.active {
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--accent-green);
        }

        .main-content {
            margin-left: 240px;
            padding: 40px;
        }

        /* Stats Cards */
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: none;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 2rem;
            color: var(--accent-green);
            opacity: 0.8;
        }

        /* Dashboard Sections */
        .dashboard-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .mono {
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
        }

        .badge-fraud {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .badge-event {
            background: #e2e3e5;
            color: #383d41;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>Iconics Admin</h2>
        <nav class="nav flex-column">
            <a class="nav-link active" href="dashboard.html">Dashboard</a>
            <a class="nav-link" href="listings.html">Listings</a>
            <a class="nav-link" href="agents.html">Agents</a>
            <hr style="background: rgba(255,255,255,0.1)">
            <a class="nav-link text-danger" href="#" onclick="logout()">Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="mb-5">
            <h1 style="font-family: 'Playfair Display', serif;" id="admin-name">Welcome, Admin</h1>
            <p class="text-muted">System Overview & Security Integrity Trail</p>
        </div>

        <div class="row mb-5">
            <div class="col-md-4">
                <div class="stat-card">
                    <h6 class="text-muted text-uppercase small">Pending Review</h6>
                    <h2 id="stat-pending">--</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <h6 class="text-muted text-uppercase small">Flagged for Fraud</h6>
                    <h2 id="stat-flagged" style="color: var(--accent-red);">--</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <h6 class="text-muted text-uppercase small">Active Agents</h6>
                    <h2 id="stat-agents">--</h2>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-5">
                <div class="dashboard-section">
                    <h5 class="mb-4" style="font-family: 'Playfair Display';">Fraud & Security Alerts</h5>
                    <div id="fraud-alerts-list">
                        <p class="text-muted small">No immediate threats detected.</p>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="dashboard-section">
                    <h5 class="mb-4" style="font-family: 'Playfair Display';">System Audit Log</h5>
                    <table class="table table-sm align-middle">
                        <thead>
                            <tr class="text-muted small">
                                <th>TIME</th>
                                <th>EVENT</th>
                                <th>USER</th>
                                <th>IP</th>
                            </tr>
                        </thead>
                        <tbody id="audit-log-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
        async function initDashboard() {
            try {
                // Fetch Stats
                const stats = await Iconics.call("property/stats", "GET");
                if (stats.status === "success") {
                    document.getElementById('stat-pending').innerText = stats.data.pending;
                    document.getElementById('stat-flagged').innerText = stats.data.flagged;
                    document.getElementById('stat-agents').innerText = stats.data.agents;
                }

                // Fetch Fraud Alerts (Flagged Listings)
                const fraudRes = await Iconics.call("property/list_flagged", "GET");
                if (fraudRes.status === "success") {
                    const container = document.getElementById('fraud-alerts-list');
                    if (fraudRes.data.length > 0) {
                        container.innerHTML = fraudRes.data.map(item => `
                            <div class="p-3 mb-2 rounded border-start border-danger border-4 bg-light">
                                <div class="d-flex justify-content-between">
                                    <strong>Listing ID: #${item.id}</strong>
                                    <span class="badge badge-fraud">SUSPICIOUS</span>
                                </div>
                                <p class="mb-0 small text-truncate">${item.title}</p>
                                <small class="text-muted">Agent: ${item.agent_name || 'Unknown'}</small>
                            </div>
                        `).join('');
                    }
                }

                // Fetch Audit Logs (Simulated based on audit_log.php structure)
                const auditRes = await Iconics.call("admin/audit_logs", "GET");
                if (auditRes.status === "success") {
                    const tbody = document.getElementById('audit-log-body');
                    tbody.innerHTML = auditRes.data.map(log => `
                        <tr>
                            <td class="mono">${new Date(log.logged_at).toLocaleTimeString()}</td>
                            <td><span class="badge badge-event">${log.event_type}</span></td>
                            <td>${log.full_name || 'System'}</td>
                            <td class="mono text-muted">${log.ip_address || '—'}</td>
                        </tr>
                    `).join('');
                }

            } catch (err) {
                console.error("Dashboard Load Error:", err);
            }
        }

        async function logout() {
            await Iconics.call("auth/logout", "POST");
            window.location.href = "../auth.html";
        }

        window.onload = async () => {
            const auth = await Iconics.check();
            if (auth.status === "success" && auth.data.user.role === 'admin') {
                document.getElementById('admin-name').innerText = "Welcome, " + (auth.data.user.name || "Admin");
                initDashboard();
            } else {
                window.location.href = "../auth.html";
            }
        };
    </script>
</body>

</html>

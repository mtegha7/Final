<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Listing — Iconics Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.min.css">
    <style>
        :root {
            --primary-dark: #0f1923;
            --accent-green: #35ac39;
            --accent-red: #d9534f;
            --text-gray: #777;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }

        .sidebar {
            height: 100vh;
            background: var(--primary-dark);
            color: white;
            padding-top: 20px;
            position: fixed;
            width: 240px;
        }

        .sidebar h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-size: 22px;
            margin-bottom: 30px;
            color: var(--accent-green);
        }

        .nav-link {
            color: #adb5bd;
            padding: 12px 25px;
            transition: 0.3s;
            text-decoration: none;
            display: block;
        }

        .nav-link:hover,
        .nav-link.active {
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--accent-green);
        }

        .main-content {
            margin-left: 240px;
            padding: 40px;
        }

        .profile-card,
        .edit-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .meta-label {
            color: #6b7280;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.25rem;
        }

        .verification-image {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #ddd;
        }

        .progress-wrapper {
            margin-top: 1rem;
        }

        .property-attribute {
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>Iconics Admin</h2>
        <nav class="nav flex-column">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link" href="listings.html">Listings</a>
            <a class="nav-link" href="agents.html">Agents</a>
            <hr style="background: rgba(255,255,255,0.1)">
            <a class="nav-link text-danger" href="#" onclick="logout()">Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 style="font-family: 'Playfair Display', serif;">Listing Details</h1>
                <p class="text-muted">Review and edit the selected property details.</p>
            </div>
            <button class="btn btn-outline-secondary" onclick="window.location.href='listings.html'">Back to
                Listings</button>
        </div>

        <div class="row">
            <div class="col-lg-5">
                <div class="profile-card">
                    <h5 class="mb-4">Listing Summary</h5>
                    <p class="meta-label">Title</p>
                    <h4 id="detail-title">--</h4>
                    <div class="property-attribute">
                        <p class="meta-label">Agent</p>
                        <p id="detail-agent">--</p>
                    </div>
                    <div class="property-attribute">
                        <p class="meta-label">Status</p>
                        <p id="detail-status">--</p>
                    </div>
                    <div class="property-attribute">
                        <p class="meta-label">Price</p>
                        <p id="detail-price">--</p>
                    </div>
                    <div class="property-attribute">
                        <p class="meta-label">Location</p>
                        <p id="detail-location">--</p>
                    </div>
                    <div class="property-attribute">
                        <p class="meta-label">Type</p>
                        <p id="detail-type">--</p>
                    </div>
                    <div class="property-attribute">
                        <p class="meta-label">Coordinates</p>
                        <p id="detail-coordinates">--</p>
                    </div>
                    <div class="progress-wrapper">
                        <p class="meta-label">Approval Progress</p>
                        <div class="progress" style="height: 14px;">
                            <div id="detail-progress" class="progress-bar bg-success" role="progressbar"
                                title="Approval progress" style="width: 0%;" aria-valuenow="0" aria-valuemin="0"
                                aria-valuemax="100">0%</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="edit-card">
                    <h5 class="mb-4">Edit Listing</h5>
                    <form id="listingForm">
                        <input type="hidden" id="property-id">
                        <div class="mb-3">
                            <label class="form-label" for="listing-title">Title</label>
                            <input type="text" id="listing-title" class="form-control" placeholder="Enter listing title"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="listing-price">Price</label>
                            <input type="number" id="listing-price" class="form-control" placeholder="Enter price"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="listing-description">Description</label>
                            <textarea id="listing-description" class="form-control" rows="4"
                                placeholder="Enter property description"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="listing-area">Area Name</label>
                            <input type="text" id="listing-area" class="form-control" placeholder="Enter area name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="listing-type">Property Type</label>
                            <input type="text" id="listing-type" class="form-control" placeholder="Enter property type">
                        </div>
                        <div class="mb-3 row">
                            <div class="col-md-6">
                                <label class="form-label" for="listing-latitude">Latitude</label>
                                <input type="number" id="listing-latitude" class="form-control" step="0.000001"
                                    placeholder="Latitude">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="listing-longitude">Longitude</label>
                                <input type="number" id="listing-longitude" class="form-control" step="0.000001"
                                    placeholder="Longitude">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="listing-status">Status</label>
                            <select id="listing-status" class="form-select" title="Property status">
                                <option value="pending">Pending</option>
                                <option value="approved">Approved</option>
                                <option value="rejected">Rejected</option>
                            </select>
                        </div>
                        <div class="d-flex gap-2 justify-content-end">
                            <button type="button" class="btn btn-secondary"
                                onclick="window.location.href='listings.html'">Cancel</button>
                            <button type="submit" class="btn btn-success">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script>
        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        function statusProgress(status) {
            switch (status) {
                case 'approved':
                    return 100;
                case 'pending':
                    return 40;
                case 'rejected':
                    return 10;
                default:
                    return 0;
            }
        }

        function formatCurrency(value) {
            return value ? `$${Number(value).toLocaleString()}` : '--';
        }

        async function loadListing() {
            const propertyId = getQueryParam('property_id');
            if (!propertyId) {
                alert('Property ID missing');
                window.location.href = 'listings.html';
                return;
            }

            try {
                const res = await Iconics.call('property/get', 'POST', { id: propertyId });
                if (res.status !== 'success') {
                    alert(res.message || 'Unable to load listing');
                    window.location.href = 'listings.html';
                    return;
                }

                const property = res.data;
                document.getElementById('property-id').value = property.id;
                document.getElementById('listing-title').value = property.title || '';
                document.getElementById('listing-price').value = property.price || '';
                document.getElementById('listing-description').value = property.description || '';
                document.getElementById('listing-area').value = property.area_name || '';
                document.getElementById('listing-type').value = property.property_type || '';
                document.getElementById('listing-latitude').value = property.latitude || '';
                document.getElementById('listing-longitude').value = property.longitude || '';
                document.getElementById('listing-status').value = property.status || 'pending';

                document.getElementById('detail-title').innerText = property.title || '--';
                document.getElementById('detail-agent').innerText = property.agent_name || 'Admin';
                document.getElementById('detail-status').innerText = property.status || '--';
                document.getElementById('detail-price').innerText = formatCurrency(property.price);
                document.getElementById('detail-location').innerText = property.area_name || '--';
                document.getElementById('detail-type').innerText = property.property_type || '--';
                document.getElementById('detail-coordinates').innerText = property.latitude && property.longitude ? `${property.latitude}, ${property.longitude}` : '--';

                const progress = statusProgress(property.status);
                const progressBar = document.getElementById('detail-progress');
                progressBar.style.width = `${progress}%`;
                progressBar.setAttribute('aria-valuenow', progress);
                progressBar.innerText = `${progress}%`;
            } catch (err) {
                console.error(err);
                alert('Unable to load listing details');
                window.location.href = 'listings.html';
            }
        }

        document.getElementById('listingForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const data = {
                id: document.getElementById('property-id').value,
                title: document.getElementById('listing-title').value,
                price: document.getElementById('listing-price').value,
                description: document.getElementById('listing-description').value,
                area_name: document.getElementById('listing-area').value,
                property_type: document.getElementById('listing-type').value,
                latitude: document.getElementById('listing-latitude').value,
                longitude: document.getElementById('listing-longitude').value,
                status: document.getElementById('listing-status').value
            };

            try {
                const res = await Iconics.call('property/update', 'POST', data);
                if (res.status === 'success') {
                    alert('Listing updated successfully');
                    loadListing();
                } else {
                    alert(res.message || 'Failed to update listing');
                }
            } catch (err) {
                console.error(err);
                alert('Unable to save listing');
            }
        });

        async function logout() {
            await Iconics.call('auth/logout', 'POST');
            window.location.href = '../auth.html';
        }

        window.onload = async () => {
            const auth = await Iconics.check();
            if (auth.status !== 'success' || auth.data.user.role !== 'admin') {
                window.location.href = '../auth.html';
                return;
            }
            loadListing();
        };
    </script>
</body>

</html>

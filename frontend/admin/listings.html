<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Listings — Iconics Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.min.css">
    <style>
        :root {
            --primary-dark: #0f1923;
            --accent-green: #35ac39;
            --text-gray: #777;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }

        .sidebar {
            height: 100vh;
            background: var(--primary-dark);
            color: white;
            padding-top: 20px;
            position: fixed;
            width: 240px;
        }

        .sidebar h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-size: 22px;
            margin-bottom: 30px;
            color: var(--accent-green);
        }

        .nav-link {
            color: #adb5bd;
            padding: 12px 25px;
            transition: 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--accent-green);
        }

        .main-content {
            margin-left: 240px;
            padding: 40px;
        }

        .table-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .status-select {
            font-size: 13px;
            border-radius: 20px;
            padding: 2px 10px;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>Iconics Admin</h2>
        <nav class="nav flex-column">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link active" href="listings.html">Listings</a>
            <a class="nav-link" href="agents.html">Agents</a>
            <hr style="background: rgba(255,255,255,0.1)">
            <a class="nav-link text-danger" href="#" onclick="logout()">Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 style="font-family: 'Playfair Display', serif;">Property Management</h1>
                <p class="text-muted">Review listings and manage platform status.</p>
            </div>
            <button class="btn btn-success" onclick="loadListings()">Refresh Data</button>
        </div>

        <div class="table-card">
            <table class="table align-middle">
                <thead>
                    <tr class="text-muted" style="font-size: 12px; text-transform: uppercase;">
                        <th>Property</th>
                        <th>Agent</th>
                        <th>Price</th>
                        <th>Status Control</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody id="listings-table-body">
                </tbody>
            </table>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadListings() {
            const res = await Iconics.call("property/list_all", "GET");
            if (res.status === "success") {
                const tbody = document.getElementById('listings-table-body');
                tbody.innerHTML = res.data.map(p => `
                    <tr>
                        <td>
                            <strong>${p.title}</strong><br>
                            <small class="text-muted">${p.area_name || 'Global'}</small>
                        </td>
                        <td>${p.agent_name || 'Admin'}</td>
                        <td>$${Number(p.price).toLocaleString()}</td>
                        <td>
                            <select class="status-select" onchange="updateStatus(${p.id}, this.value)">
                                <option value="pending" ${p.status === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="approved" ${p.status === 'approved' ? 'selected' : ''}>Approved</option>
                                <option value="rejected" ${p.status === 'rejected' ? 'selected' : ''}>Rejected</option>
                            </select>
                        </td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-primary" onclick="window.location.href='view-listings.html?property_id=${p.id}'">Manage</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteListing(${p.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function updateStatus(id, newStatus) {
            const res = await Iconics.call("property/update_status", "POST", { id, status: newStatus });
            if (res.status !== "success") {
                alert("Status update failed.");
            } else {
                loadListings(); // Refresh the list
            }
        }

        async function deleteListing(id) {
            if (confirm("Permanently delete this?")) {
                const res = await Iconics.call("property/delete", "POST", { id });
                if (res.status === "success") loadListings();
            }
        }

        async function logout() {
            await Iconics.call("auth/logout", "POST");
            window.location.href = "../auth.html";
        }

        window.onload = async () => {
            const auth = await Iconics.check();
            if (auth.status === "success" && auth.data.user.role === 'admin') {
                loadListings();
            } else {
                window.location.href = "../auth.html";
            }
        };
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Listings — Iconics Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.min.css">
    <style>
        :root {
            --primary-dark: #0f1923;
            --accent-green: #35ac39;
            --text-gray: #777;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }

        .sidebar {
            height: 100vh;
            background: var(--primary-dark);
            color: white;
            padding-top: 20px;
            position: fixed;
            width: 240px;
        }

        .sidebar h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-size: 22px;
            margin-bottom: 30px;
            color: var(--accent-green);
        }

        .nav-link {
            color: #adb5bd;
            padding: 12px 25px;
            transition: 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--accent-green);
        }

        .main-content {
            margin-left: 240px;
            padding: 40px;
        }

        .table-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .status-select {
            font-size: 13px;
            border-radius: 20px;
            padding: 2px 10px;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>Iconics Admin</h2>
        <nav class="nav flex-column">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link active" href="listings.html">Listings</a>
            <a class="nav-link" href="agents.html">Agents</a>
            <hr style="background: rgba(255,255,255,0.1)">
            <a class="nav-link text-danger" href="#" onclick="logout()">Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 style="font-family: 'Playfair Display', serif;">Property Management</h1>
                <p class="text-muted">Review listings and manage platform status.</p>
            </div>
            <button class="btn btn-success" onclick="loadListings()">Refresh Data</button>
        </div>

        <div class="table-card">
            <table class="table align-middle">
                <thead>
                    <tr class="text-muted" style="font-size: 12px; text-transform: uppercase;">
                        <th>Property</th>
                        <th>Agent</th>
                        <th>Price</th>
                        <th>Status Control</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody id="listings-table-body">
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="viewModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 15px;">
                <div class="modal-header border-0 bg-light">
                    <h5 class="modal-title" style="font-family: 'Playfair Display';">Listing Inspection</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" title="Close modal"></button>
                </div>
                <div class="modal-body p-4" id="view-details-content">
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 15px;">
                <div class="modal-body p-4">
                    <h5 class="mb-4">Quick Edit</h5>
                    <input type="hidden" id="edit-id">
                    <div class="mb-3">
                        <label class="form-label" for="edit-title">Title</label>
                        <input type="text" id="edit-title" class="form-control" placeholder="Enter listing title">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Price</label>
                        <input type="number" id="edit-price" class="form-control" placeholder="Enter listing price" title="Price">
                    </div>
                    <div class="d-flex justify-content-end gap-2">
                        <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button class="btn btn-primary" onclick="saveEdit()"
                            style="background: var(--accent-green); border:none;">Update</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadListings() {
            const res = await Iconics.call("property/list_all", "GET");
            if (res.status === "success") {
                const tbody = document.getElementById('listings-table-body');
                tbody.innerHTML = res.data.map(p => `
                    <tr>
                        <td>
                            <strong>${p.title}</strong><br>
                            <small class="text-muted">${p.area_name || 'Global'}</small>
                        </td>
                        <td>${p.agent_name || 'Admin'}</td>
                        <td>$${Number(p.price).toLocaleString()}</td>
                        <td>
                            <select class="status-select" onchange="updateStatus(${p.id}, this.value)">
                                <option value="pending" ${p.status === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="approved" ${p.status === 'approved' ? 'selected' : ''}>Approved</option>
                                <option value="rejected" ${p.status === 'rejected' ? 'selected' : ''}>Rejected</option>
                            </select>
                        </td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-primary" onclick='viewDetails(${JSON.stringify(p).replace(/'/g, "&apos;")})'>View</button>
                            <button class="btn btn-sm btn-outline-dark" onclick='openEdit(${JSON.stringify(p).replace(/'/g, "&apos;")})'>Edit</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteListing(${p.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function updateStatus(id, newStatus) {
            const res = await Iconics.call("property/update_status", "POST", { id, status: newStatus });
            if (res.status !== "success") alert("Status update failed.");
        }

        function viewDetails(p) {
            document.getElementById('view-details-content').innerHTML = `
                <div class="row">
                    <div class="col-md-5">
                        <div class="bg-light rounded d-flex align-items-center justify-content-center" style="height:200px; color:#ccc;">
                            [Property Image Placeholder]
                        </div>
                    </div>
                    <div class="col-md-7">
                        <h3>${p.title}</h3>
                        <p class="text-success fw-bold">$${Number(p.price).toLocaleString()}</p>
                        <p><strong>Location:</strong> ${p.area_name || 'N/A'}</p>
                        <p><strong>Agent:</strong> ${p.agent_name || 'System'}</p>
                        <hr>
                        <h6>Description:</h6>
                        <p class="text-muted small">${p.description || 'No description provided.'}</p>
                    </div>
                </div>
            `;
            new bootstrap.Modal(document.getElementById('viewModal')).show();
        }

        function openEdit(p) {
            document.getElementById('edit-id').value = p.id;
            document.getElementById('edit-title').value = p.title;
            document.getElementById('edit-price').value = p.price;
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }

        async function saveEdit() {
            const data = {
                id: document.getElementById('edit-id').value,
                title: document.getElementById('edit-title').value,
                price: document.getElementById('edit-price').value
            };
            const res = await Iconics.call("property/update", "POST", data);
            if (res.status === "success") location.reload();
        }

        async function deleteListing(id) {
            if (confirm("Permanently delete this?")) {
                const res = await Iconics.call("property/delete", "POST", { id });
                if (res.status === "success") loadListings();
            }
        }

        async function logout() {
            await Iconics.call("auth/logout", "POST");
            window.location.href = "../auth.html";
        }

        window.onload = async () => {
            const auth = await Iconics.check();
            if (auth.status === "success" && auth.data.user.role === 'admin') {
                loadListings();
            } else {
                window.location.href = "../auth.html";
            }
        };
    </script>
</body>

</html>

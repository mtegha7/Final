<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth — Iconics Real Estate</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0f1923, #1d293e, #163d2a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-card {
            background: #fff;
            padding: 40px;
            width: 360px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .auth-logo h1 {
            font-family: 'Playfair Display', serif;
            margin: 0;
        }

        .auth-logo span {
            color: #35ac39;
        }

        .auth-logo p {
            margin-top: 5px;
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #35ac39;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .toggle {
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            color: #35ac39;
            font-weight: 600;
        }

        .role-select {
            display: none;
        }

        .alert {
            font-size: 13px;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: none;
        }

        .alert.error {
            background: #ffe5e5;
            color: #c0392b;
        }

        .alert.success {
            background: #e6ffed;
            color: #27ae60;
        }
    </style>
</head>

<body>

    <div class="auth-card">

        <div class="auth-logo">
            <h1>IR<span>EA</span></h1>
            <p id="title">Login</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <div class="form-group">
            <input type="text" id="name" placeholder="Full Name" style="display:none;">
        </div>

        <div class="form-group role-select" id="roleWrap">
            <select id="role">
                <option value="client">Client</option>
                <option value="agent">Agent</option>
            </select>
        </div>

        <div class="form-group">
            <input type="email" id="email" placeholder="Email">
        </div>

        <div class="form-group">
            <input type="password" id="password" placeholder="Password">
        </div>

        <button class="btn" id="submitBtn" onclick="submitForm()">Continue</button>

        <div class="toggle" onclick="toggleMode()">
            Switch to Register
        </div>

    </div>

    <script>
        let isLogin = true;
        const BASE_URL = "http://localhost/Final/backend/api/auth.php";

        function toggleMode() {
            isLogin = !isLogin;

            document.getElementById("title").innerText = isLogin ? "Login" : "Register";
            document.getElementById("name").style.display = isLogin ? "none" : "block";
            document.getElementById("roleWrap").style.display = isLogin ? "none" : "block";

            document.querySelector(".toggle").innerText =
                isLogin ? "Switch to Register" : "Switch to Login";
        }

        function showAlert(message, type = "error") {
            const box = document.getElementById("alertBox");
            box.innerText = message;
            box.className = "alert " + type;
            box.style.display = "block";
        }

        function redirectByRole(role) {
            if (role === "admin") {
                window.location.href = "admin/dashboard.html";
            } else if (role === "agent") {
                window.location.href = "agent/dashboard.html";
            } else {
                window.location.href = "client/dashboard.html";
            }
        }

        async function submitForm() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const name = document.getElementById("name").value.trim();
            const role = document.getElementById("role").value;

            if (!email || !password || (!isLogin && !name)) {
                showAlert("Please fill all required fields");
                return;
            }

            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerText = "Processing...";

            const action = isLogin ? "login" : "register";

            const payload = isLogin
                ? { email, password }
                : { name, email, password, role };

            try {
                const res = await fetch(`${BASE_URL}?action=${action}`, {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (data.error) {
                    showAlert(data.error, "error");
                } else {
                    showAlert("Success! Redirecting...", "success");

                    setTimeout(() => {
                        redirectByRole(data.user.role);
                    }, 800);
                }

            } catch (err) {
                showAlert("Network error. Try again.");
            }

            btn.disabled = false;
            btn.innerText = "Continue";
        }

        document.addEventListener("keydown", e => {
            if (e.key === "Enter") submitForm();
        });
    </script>

</body>

</html>

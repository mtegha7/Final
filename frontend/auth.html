<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth — Iconics Real Estate</title>


    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0f1923, #1d293e, #163d2a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-card {
            background: #fff;
            padding: 40px;
            width: 360px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .auth-logo h1 {
            font-family: 'Playfair Display', serif;
            margin: 0;
        }

        .auth-logo span {
            color: #35ac39;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #35ac39;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .toggle {
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            color: #35ac39;
            font-weight: 600;
        }

        .alert {
            display: none;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            font-size: 13px;
        }

        .error {
            background: #ffe5e5;
            color: #c0392b;
        }

        .success {
            background: #e6ffed;
            color: #27ae60;
        }
    </style>


</head>

<body>

    <div class="auth-card">


        <div class="auth-logo">
            <h1>IR<span>EA</span></h1>
            <p id="title">Login</p>
        </div>

        <div id="alert" class="alert"></div>

        <input type="text" id="name" placeholder="Full Name" style="display:none;">
        <select id="role" style="display:none;">
            <option value="client">Client</option>
            <option value="agent">Agent</option>
        </select>

        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">

        <button class="btn" onclick="submit()">Continue</button>

        <div class="toggle" onclick="toggleMode()">
            Switch to Register
        </div>


    </div>

    <script src="assets/js/api.js"></script>

    <script>
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;

            document.getElementById("title").innerText = isLogin ? "Login" : "Register";
            document.getElementById("name").style.display = isLogin ? "none" : "block";
            document.getElementById("role").style.display = isLogin ? "none" : "block";
        }

        function show(msg, type) {
            const el = document.getElementById("alert");
            el.style.display = "block";
            el.className = "alert " + type;
            el.innerText = msg;
        }

        async function submit() {
            const emailVal = document.getElementById("email").value;
            const passwordVal = document.getElementById("password").value;

            if (!emailVal || !passwordVal) return show("Fields required", "error");

            try {
                const res = isLogin ?
                    await Iconics.login({ email: emailVal, password: passwordVal }) :
                    await Iconics.register({
                        full_name: document.getElementById("name").value,
                        email: emailVal,
                        password: passwordVal,
                        role: document.getElementById("role").value
                    });


                if (res.status === "success") {
                    show("Success! Redirecting...", "success");

                    const role = res.data?.user?.role;
                    if (role) {
                        setTimeout(() => {
                            Iconics.redirectByRole(role);
                        }, 500);
                    } else {
                        show("User role missing", "error");
                    }
                } else {
                    // Handle error messages from Response::error()
                    show(res.message || "Authentication failed", "error");
                }
            } catch (err) {
                show("Server connection failed", "error");
            }
        }

    </script>

</body>

</html>
